<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard</title>
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <!-- Стили (абсолютные пути!) -->
    <link rel="stylesheet" href="/src/styles/reset.css">
    <link rel="stylesheet" href="/src/styles/variables.css">
    <link rel="stylesheet" href="/src/styles/main.css">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📊 Smart Dashboard</h1>
                <div class="user-profile">
                    <span id="user-display" class="user-display">Гость</span>
                    <button onclick="logout()" class="logout-btn">Выход</button>
                    <label class="theme-toggle">
                        <input type="checkbox" id="themeSwitch">
                        <span class="slider"></span>
                    </label>
                    <div class="points-display">...</div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="navigation">
            <button data-route="tasks" class="nav-btn active">
                <span class="nav-icon">📝</span> Задачи
            </button>
            <button data-route="notes" class="nav-btn">
                <span class="nav-icon">📔</span> Заметки  
            </button>
            <button data-route="tracker" class="nav-btn">
                <span class="nav-icon">📈</span> Прогресс
            </button>
        </nav>

        <!-- Main Content -->
        <main id="main-container">
            <!-- Auth экран будет добавлен через JS -->
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 Smart Dashboard PWA | Работает оффлайн</p>
        </footer>
    </div>

    <!-- ✅ ВАЖНО: type="module" для ES-модулей -->
    <script type="module" src="/src/main.js"></script>
    
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/src/serviceWorker.js')
                .then(reg => console.log('✅ SW registered'))
                .catch(err => console.log('❌ SW failed:', err));
        }
    </script>
    
    <!-- Theme Switch -->
    <script>
        const themeSwitch = document.getElementById('themeSwitch');
        if (themeSwitch) {
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            html.setAttribute('data-theme', savedTheme);
            themeSwitch.checked = savedTheme === 'dark';
            themeSwitch.onchange = () => {
                const theme = themeSwitch.checked ? 'dark' : 'light';
                html.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            };
        }
    </script>
</body>
</html>
