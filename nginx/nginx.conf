worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # ✅ Корневая папка — public (где лежит index.html)
        root /usr/share/nginx/html/public;
        index index.html;

        # =========================
        # PROXY ДЛЯ BACKEND (Render)
        # =========================
        location /api/ {
            # ✅ НЕ убираем /api/ — бэкенд ожидает именно этот префикс!
            proxy_pass https://webapp-1-0c95.onrender.com;
            proxy_http_version 1.1;
            
            # ✅ Host должен совпадать с доменом в proxy_pass
            proxy_set_header Host webapp-1-0c95.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Таймауты
            proxy_connect_timeout 75s;
            proxy_send_timeout 75s;
            proxy_read_timeout 75s;
            
            # Буферы
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
            
            # Без редиректов
            proxy_redirect off;
        }

        # =========================
        # SPA ROUTING (fallback на index.html)
        # =========================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # =========================
        # ДОСТУП К SRC (JS, CSS)
        # =========================
        location /src/ {
            alias /usr/share/nginx/html/src/;
            types {
                text/css css;
                application/javascript js;
            }
            add_header Cache-Control "no-cache";
        }

        # =========================
        # КЭШИРОВАНИЕ СТАТИКИ
        # =========================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # =========================
        # MANIFEST — правильный MIME-тип
        # =========================
        location = /manifest.json {
            add_header Content-Type application/manifest+json;
        }

        # =========================
        # SERVICE WORKER — без кэша
        # =========================
        location = /src/serviceWorker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # =========================
        # OFFLINE FALLBACK
        # =========================
        error_page 404 /offline.html;
    }
}