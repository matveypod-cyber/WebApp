# УДАЛИТЕ эти строки (они уже есть в основном конфиге nginx):
# worker_processes 1;
# events { worker_connections 1024; }
# http {

server {
    listen 80;
    server_name localhost;

    # Корневая папка — public
    root /usr/share/nginx/html/public;
    index index.html;

    # =========================
    # SPA fallback (роутинг)
    # =========================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =========================
    # Доступ к src (JS, CSS)
    # =========================
    location /src/ {
        alias /usr/share/nginx/html/src/;
    }

    # =========================
    # Кэширование статики
    # =========================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # =========================
    # Manifest — правильный MIME-тип
    # =========================
    location = /manifest.json {
        add_header Content-Type application/manifest+json;
    }

    # =========================
    # Service Worker — без кэша
    # =========================
    location = /src/serviceWorker.js {
        add_header Cache-Control "no-cache";
    }

    # =========================
    # Offline fallback
    # =========================
    error_page 404 /offline.html;
}